# Swaylock Configuration
# Matching the theme from sway config (blue #0f640fe6, white #ffffff)

# ============================================================================
# Background
# ============================================================================
image=/home/lachlan/Pictures/background/linux/evangelion-rei.png
scaling=fill
color=0f320fe6

# ============================================================================
# Indicator (the unlock ring)
# ============================================================================
ring-color=0f640fe6
ring-clear-color=0f640fe6
ring-ver-color=ffffff
ring-wrong-color=ff0000

inside-color=ffffff
inside-clear-color=0f320fe6
inside-ver-color=ffffff
inside-wrong-color=ff0000

line-color=ffffff
line-clear-color=ffffff
line-ver-color=ffffff
line-wrong-color=ff0000

text-color=ffffff
text-clear-color=ffffff
text-ver-color=ffffff
text-wrong-color=ff0000

# Indicator geometry
indicator-radius=50
indicator-thickness=8

# ============================================================================
# Keyboard Layout
# ============================================================================
show-keyboard-layout
layout-text-color=ffffff
layout-bg-color=0f640fe680
layout-border-color=ffffff

# ============================================================================
# Text Display
# ============================================================================
disable-caps-lock-text
indicator-caps-lock

# ============================================================================
# Highlight Segments (key press feedback)
# ============================================================================
key-hl-color=ffffff
bs-hl-color=ff0000
caps-lock-key-hl-color=0f640fe6
caps-lock-bs-hl-color=ff0000

# ============================================================================
# Behavior
# ============================================================================
daemonize
ignore-empty-password
show-failed-attempts

# ============================================================================
# Font
# ============================================================================
font=FiraMono Nerd Font 12
