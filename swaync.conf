{
    "general": {
        "connect_to_sn": true,
        "monitor_names": [""],
        "history": [
            {
                "app_blacklist": ["swaync-client"],
                "notif_blacklist": ["Swaync actions can not be reverted"],
                "max_notifs": 50,
                "age": 2
            }
        ],
        "sorting": "NewestFirst",
        "clear_on_action": false,
        "close_on_action": true,
        "show_indicators": true,
        "log_notifs": false,
        "output_follows_focus": true
    },
    "layer": {
        "width": 350,
        "h_margins": 20,
        "v_margins": 20,
        "corner": "topright",
        "gaps": {
            "outer": 5,
            "inner": 5
        },
        "border": {
            "size": 2,
            "color": "#0f640fe6"
        },
        "shadow": {
            "size": 5,
            "color": "#00000080"
        },
        "blur": false,
        "blur_size": 3,
        "blur_passes": 1,
        "roundness": 5,
        "separators": true
    },
    "urgency": {
        "low": {
            "border_color": "#0f640fe6",
            "timeout": 10
        },
        "normal": {
            "border_color": "#0f640fe6",
            "timeout": 10
        },
        "critical": {
            "border_color": "#ff0000",
            "timeout": 0
        }
    },
    "app": {
        "default": {
            "urgency": "Normal",
            "border_color": "#0f640fe6"
        },
        "rules": []
    },
    "notif": {
        "default": {
            "urgency": "Normal",
            "border_color": "#0f640fe6"
        },
        "rules": []
    },
    "controls": {
        "win": {
            "width": 350,
            "v_margins": 5,
            "h_margins": 5,
            "gaps": 5,
            "border": {
                "size": 0,
                "color": "#00000000"
            },
            "roundness": 5,
            "separators": false
        },
        "label": {
            "text": "Notifications",
            "font": {
                "family": "FiraMono Nerd Font",
                "size": 12,
                "style": "Bold"
            },
            "color": "#ffffff",
            "padding": 5
        },
        "buttons": {
            "layout": "|H[::M]|R",
            "size": 24,
            "padding": 5,
            "roundness": 3,
            "colors": {
                "close": {
                    "normal": {
                        "background": "#00000000",
                        "text": "#ffffff"
                    },
                    "hover": {
                        "background": "#0f640fe6",
                        "text": "#ffffff"
                    },
                    "pressed": {
                        "background": "#0f320fe6",
                        "text": "#ffffff"
                    }
                },
                "config": {
                    "normal": {
                        "background": "#00000000",
                        "text": "#ffffff"
                    },
                    "hover": {
                        "background": "#0f640fe6",
                        "text": "#ffffff"
                    },
                    "pressed": {
                        "background": "#0f320fe6",
                        "text": "#ffffff"
                    }
                }
            }
        }
    },
    "notif": {
        "win": {
            "width": 350,
            "v_margins": 5,
            "h_margins": 5,
            "gaps": 5,
            "border": {
                "size": 0,
                "color": "#00000000"
            },
            "roundness": 5,
            "separators": false
        },
        "app": {
            "show": ["appname", "icon"],
            "font": {
                "family": "FiraMono Nerd Font",
                "size": 10,
                "style": "Bold"
            },
            "color": "#ffffff",
            "padding": 5
        },
        "summary": {
            "font": {
                "family": "FiraMono Nerd Font",
                "size": 10,
                "style": "Bold"
            },
            "color": "#ffffff",
            "max_lines": 2,
            "ellipsize": true,
            "ellipsize_str": "...",
            "padding": 5
        },
        "body": {
            "font": {
                "family": "FiraMono Nerd Font",
                "size": 10,
                "style": "Normal"
            },
            "color": "#ffffff",
            "max_lines": 5,
            "ellipsize": true,
            "ellipsize_str": "...",
            "padding": 5
        },
        "actions": {
            "font": {
                "family": "FiraMono Nerd Font",
                "size": 10,
                "style": "Normal"
            },
            "color": "#0f640fe6",
            "padding": 5
        }
    }
}
